apiVersion: v1
kind: ServiceAccount
metadata:
  name: ssa-backend
  annotations:
    iam.gke.io/gcp-service-account: ssa-workload@promptwars-493516.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssa-backend
  labels:
    app: ssa-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ssa-backend
  template:
    metadata:
      labels:
        app: ssa-backend
    spec:
      serviceAccountName: ssa-backend
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/promptwars-493516/smart-stadium/backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: "production"
            - name: FRONTEND_ORIGIN
              value: "https://stadium-assistant.example.com"
          volumeMounts:
            - name: secrets
              mountPath: /secrets
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      volumes:
        - name: secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: gcp-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ssa-backend
spec:
  selector:
    app: ssa-backend
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssa-frontend
  labels:
    app: ssa-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ssa-frontend
  template:
    metadata:
      labels:
        app: ssa-frontend
    spec:
      containers:
        - name: frontend
          image: us-central1-docker.pkg.dev/promptwars-493516/smart-stadium/frontend:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ssa-frontend
spec:
  selector:
    app: ssa-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ssa-ingress
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: "ssa-cert"
spec:
  defaultBackend:
    service:
      name: ssa-frontend
      port:
        number: 80
  rules:
    - http:
        paths:
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: ssa-backend
                port:
                  number: 80
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: ssa-frontend
                port:
                  number: 80
