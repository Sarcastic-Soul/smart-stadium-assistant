name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: promptwars-493516
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/promptwars-493516/smart-stadium
  GKE_CLUSTER: smart-stadium-gke

jobs:
  # ── Backend Lint & Test ───────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Test (pytest)
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  # ── Frontend Lint & Test ──────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint || true

      - name: Test (vitest)
        run: npm run test

  # ── Docker Build & Push ───────────────────────────────────────
  docker:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push Backend
        run: |
          docker build -t ${{ env.REGISTRY }}/backend:${{ github.sha }} \
                        -t ${{ env.REGISTRY }}/backend:latest \
                        backend/
          docker push ${{ env.REGISTRY }}/backend --all-tags

      - name: Build & Push Frontend
        run: |
          docker build -t ${{ env.REGISTRY }}/frontend:${{ github.sha }} \
                        -t ${{ env.REGISTRY }}/frontend:latest \
                        frontend/
          docker push ${{ env.REGISTRY }}/frontend --all-tags

  # ── Deploy to GKE ─────────────────────────────────────────────
  deploy:
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }}

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/ssa-backend \
            backend=${{ env.REGISTRY }}/backend:${{ github.sha }}
          kubectl set image deployment/ssa-frontend \
            frontend=${{ env.REGISTRY }}/frontend:${{ github.sha }}
          kubectl rollout status deployment/ssa-backend --timeout=120s
          kubectl rollout status deployment/ssa-frontend --timeout=120s
